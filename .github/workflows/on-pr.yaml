name: on-pr

on:
  pull_request:
    branches:
      - main
    types:
      - labeled
      - opened
      - reopened
      - synchronize
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/**"

permissions:
  packages: write
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...

  publish:
    needs: test
    uses: unbounded-tech/workflows-containers/.github/workflows/publish.yaml@v1.8.0
    with:
      tag_branch_on_pr: true
      platforms: linux/amd64,linux/arm64
