name: on-version-tagged

on:
  push:
    tags:
      - v*.*.*

permissions:
  packages: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  publish:
    uses: unbounded-tech/workflows-containers/.github/workflows/publish.yaml@main
    with:
      tag_sha: true

  release:
    needs: publish
    uses: unbounded-tech/workflow-simple-release/.github/workflows/workflow.yaml@v2.1.1
    with:
      tag: ${{ github.ref_name }}
      name: ${{ github.ref_name }}
