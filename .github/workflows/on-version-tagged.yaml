name: on-version-tagged

on:
  push:
    tags:
      - v*.*.*

permissions:
  packages: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  publish:
    uses: unbounded-tech/workflows-containers/.github/workflows/publish.yaml@v1.8.0
    with:
      tag_sha: true
      # Cover both EKS amd64 nodes and arm64 dev clusters (colima, M-series).
      platforms: linux/amd64,linux/arm64

  release:
    needs: publish
    uses: unbounded-tech/workflow-simple-release/.github/workflows/workflow.yaml@v2.1.3
    with:
      tag: ${{ github.ref_name }}
      name: ${{ github.ref_name }}
